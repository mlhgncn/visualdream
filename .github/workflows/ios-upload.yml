name: Upload IPA to TestFlight
name: Upload IPA to TestFlight

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  upload:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'

      - name: Install dependencies
        run: |
          gem install bundler || true
          bundle config set path 'vendor/bundle' || true
          bundle install || gem install fastlane

      - name: Install CocoaPods
        run: |
          gem install cocoapods || true

      - name: Prepare App Store Connect API key
        run: |
          if [ -z "$ASC_PRIVATE_KEY" ]; then echo "ASC_PRIVATE_KEY is empty"; exit 1; fi
          echo "$ASC_PRIVATE_KEY" > /tmp/AuthKey.p8
          chmod 600 /tmp/AuthKey.p8
        env:
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}

      - name: Download IPA from IPA_URL (optional)
        run: |
          if [ -n "$IPA_URL" ]; then
            mkdir -p client
            echo "Downloading IPA from $IPA_URL"
            curl -L --fail "$IPA_URL" -o client/upload.ipa
            ls -lh client/upload.ipa || true
            echo "IPA_PATH=client/upload.ipa" >> $GITHUB_ENV
          else
            echo "No IPA_URL provided; skipping download."
          fi
        env:
          IPA_URL: ${{ secrets.IPA_URL }}

      - name: Build + Upload (Fastlane)
        run: |
          set -e
          LOG=fastlane.log
          if [ -f upload.ipa ] || [ -f client/upload.ipa ]; then
            echo "Found IPA in repo, setting IPA_PATH and running upload only"
            if [ -f upload.ipa ]; then
              echo "IPA_PATH=upload.ipa" >> $GITHUB_ENV
            else
              echo "IPA_PATH=client/upload.ipa" >> $GITHUB_ENV
            fi
            bundle exec fastlane ios ci_upload 2>&1 | tee "$LOG"; rc=${PIPESTATUS[0]}
            echo "FASTLANE_RC=$rc" >> $GITHUB_ENV
            if [ $rc -ne 0 ]; then exit $rc; fi
          else
            echo "No IPA found: running full build+upload (ci_build then ci_upload)"
            bundle exec fastlane ios ci_build 2>&1 | tee "$LOG"; rc=${PIPESTATUS[0]}
            if [ $rc -ne 0 ]; then exit $rc; fi
            bundle exec fastlane ios ci_upload 2>&1 | tee -a "$LOG"; rc=${PIPESTATUS[0]}
            if [ $rc -ne 0 ]; then exit $rc; fi
          fi
        shell: bash
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}

      - name: Upload fastlane log
        uses: actions/upload-artifact@v4
        with:
          name: fastlane-log
          path: fastlane.log

      - name: Print fastlane.log
        if: always()
        run: |
          echo "--- fastlane.log ---"
          test -f fastlane.log && tail -n 400 fastlane.log || echo "fastlane.log not found"
          uses: actions/upload-artifact@v3
          with:
            name: fastlane-logs
            path: fastlane.log

        - name: Print fastlane log
          if: always()
          run: |
            echo "---- FASTLANE LOG BEGIN ----"
            if [ -f fastlane.log ]; then cat fastlane.log; else echo "fastlane.log not found"; fi
            echo "---- FASTLANE LOG END ----"
