name: Upload IPA to TestFlight

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  upload:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.1

      - name: Install dependencies
        run: |
          gem install bundler || true
          bundle config set path 'vendor/bundle' || true
          bundle install || gem install fastlane

      - name: Install CocoaPods
        run: |
          gem install cocoapods || true

      - name: Install iOS pods
        run: |
          if [ -d "client/ios" ]; then
            cd client/ios
            pod install --repo-update || true
            cd ../..
          fi

      - name: Prepare App Store Connect API key
        env:
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          if [ -z "$ASC_PRIVATE_KEY" ]; then echo "ASC_PRIVATE_KEY is empty"; exit 1; fi
          echo "$ASC_PRIVATE_KEY" > /tmp/AuthKey.p8
          chmod 600 /tmp/AuthKey.p8

      - name: Download IPA from IPA_URL (optional)
        env:
          IPA_URL: ${{ secrets.IPA_URL }}
        run: |
          if [ -n "$IPA_URL" ]; then
            mkdir -p client
            echo "Downloading IPA from $IPA_URL"
            curl -L --fail "$IPA_URL" -o client/upload.ipa
            ls -lh client/upload.ipa || true
            echo "IPA_PATH=client/upload.ipa" >> $GITHUB_ENV
          else
            echo "No IPA_URL provided; skipping download."
          fi

      - name: Build + Upload (Fastlane)
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          SCHEME: ${{ secrets.SCHEME }}
          WORKSPACE: ${{ secrets.WORKSPACE }}
          PROJECT: ${{ secrets.PROJECT }}
        run: |
          # Build the app (uses match to fetch certificates), then upload
          bundle exec fastlane ios ci_build
          bundle exec fastlane ios ci_upload
