name: Upload IPA to TestFlight

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  upload:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.1

      - name: Install dependencies
        run: |
          gem install bundler || true
          bundle config set path 'vendor/bundle' || true
          bundle install || gem install fastlane

      - name: Prepare App Store Connect API key
        env:
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          if [ -z "$ASC_PRIVATE_KEY" ]; then echo "ASC_PRIVATE_KEY is empty"; exit 1; fi
          echo "$ASC_PRIVATE_KEY" > /tmp/AuthKey.p8
          chmod 600 /tmp/AuthKey.p8

      - name: Upload IPA to TestFlight (Fastlane)
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          bundle exec fastlane ios ci_upload
